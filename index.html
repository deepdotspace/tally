<!DOCTYPE html>
<!--
  Tally — live audience polls. Light is the primary app theme; the persisted
  mode is applied before first paint by the inline boot script below (no FOUC).
  Mode values live in src/themes.css.
-->
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Tally</title>

    <!-- Display = Archivo, UI = Hanken Grotesk, code/labels = JetBrains Mono. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <script>
      // Apply the persisted mode (default light) before first paint.
      (function () {
        try {
          var m = localStorage.getItem('tally-theme')
          if (m !== 'dark') m = 'light'
          document.documentElement.setAttribute('data-theme', m)
          document.documentElement.style.colorScheme = m
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
